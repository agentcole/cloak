name: Publish

# Publishes to PyPI on a version tag (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — configure the publisher for this repo at
# https://pypi.org/manage/project/cloak-llm/settings/publishing/ (no API token).
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install into a venv (the runner's system Python is externally managed,
      # so --system is blocked). Core + the lightweight extras; NER / Faker /
      # MCP / LLM are heavy or need a service — their tests skip when absent.
      - name: Create venv + install
        run: |
          uv venv
          uv pip install -e ".[dev,proxy,phone,config]"

      - name: Lint (ruff)
        run: .venv/bin/python -m ruff check .

      - name: Format check (ruff)
        run: .venv/bin/python -m ruff format --check .

      - name: Type check (mypy)
        run: .venv/bin/python -m mypy src/cloak

      - name: Test (pytest)
        run: .venv/bin/python -m pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Install the built wheel and import
        run: |
          uv venv
          uv pip install dist/*.whl
          .venv/bin/python -c "import cloak; print('cloak', cloak.__version__)"
